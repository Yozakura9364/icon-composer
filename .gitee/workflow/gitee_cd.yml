# Gitee Go 构建流水线（构建 Electron Windows 便携版）
# 文档：https://gitee.com/help/articles/4290
#
# 使用前请修改：
#   1) product 为你的 Gitee 仓库路径（与网页地址一致：用户名/仓库名）
#   2) 确认 Gitee Go 使用的构建主机为 Windows（electron-builder --win 需在 Windows 上执行）
#
gitee_cd_config:
  product: yozakurayuy3/icon-composer   # TODO: 改成你的 Gitee「用户名/仓库名」
  version: 1.0.0
  entry: >-
    cd electron
      && npm install
      && npm run build
  cache:
    enable: true
    dirs:
      - electron/node_modules/
  release:
    enable: true
    targets:
      - type: external
        name: IconComposer-${GITEE_BUILD_VERSION}
        files:
          # electron-builder 默认输出在 electron/dist/
          - electron/dist/*.exe

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>装备名称卡 · equip-card-maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --panel: #1a1d27;
  --border: #2d3147;
  --text: #e8eaf0;
  --text-dim: #7a8194;
  --accent: #60a5fa;
  --card-bg: #1a1d27;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 14px;
}
header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
h1 { font-size: 15px; font-weight: 700; margin: 0 0 4px; }
.sub { font-size: 11px; color: var(--text-dim); }
.layout {
  display: grid;
  grid-template-columns: minmax(280px, 420px) 1fr;
  gap: 16px;
  padding: 16px;
  align-items: start;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
}
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
}
label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
input[type="text"], input[type="number"], input[type="url"] {
  width: 100%;
  padding: 8px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #12151c;
  color: var(--text);
  font-size: 13px;
}
.row { margin-bottom: 10px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
button {
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}
.btn-primary { background: var(--accent); color: #111; }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); }
#resultList {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 220px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #12151c;
}
#resultList li {
  padding: 8px 10px;
  font-size: 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}
#resultList li:hover { background: rgba(96,165,250,0.12); }
#resultList li:last-child { border-bottom: none; }
.preview-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  overflow: auto;
}
#preview {
  display: block;
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  cursor: crosshair;
  touch-action: none;
}
.hint { font-size: 11px; color: var(--text-dim); line-height: 1.45; margin-top: 8px; }
#csvStatus { font-size: 12px; color: var(--accent); }
#selName { font-weight: 600; color: var(--text); }
</style>
</head>
<body>
<header>
  <h1>装备名称卡（equip-card-maker）</h1>
  <div class="sub">数据：Item.csv（K 列名称 / L 列或 Image 列图标）；图标路径与铭牌项目一致：{6位}/{6位}_hr1.png · 思源黑体（Noto Sans SC）</div>
</header>
<div class="layout">
  <div class="panel">
    <div class="row">
      <label>Item.csv 地址</label>
      <input type="url" id="csvUrl" value="https://raw.githubusercontent.com/InfSein/ffxiv-datamining-mixed/master/chs/Item.csv">
    </div>
    <div class="row">
      <label>图床根 URL（R2/Worker，末尾无斜杠）</label>
      <input type="url" id="iconBase" placeholder="https://你的域名" value="https://portable-icon.2513985996.workers.dev">
    </div>
    <div class="row2">
      <div>
        <label>Name 列下标（K=10）</label>
        <input type="number" id="nameCol" value="10" min="0" title="Excel 列 K 对应 0 起下标 10">
      </div>
      <div>
        <label>Icon 列下标（空=自动找 Image）</label>
        <input type="text" id="iconCol" value="" placeholder="默认 11 或 Image">
      </div>
    </div>
    <div class="row">
      <button type="button" class="btn-ghost" id="loadCsvBtn">重新加载 CSV</button>
      <span id="csvStatus"></span>
    </div>
    <div class="row">
      <label>搜索装备名（含匹配）</label>
      <input type="text" id="searchInput" placeholder="输入名称关键词" disabled>
    </div>
    <div class="row">
      <button type="button" class="btn-primary" id="searchBtn" disabled>搜索</button>
    </div>
    <ul id="resultList"></ul>
    <div class="row">
      <span>当前：</span><span id="selName">未选择</span>
    </div>
    <div class="row2">
      <div>
        <label>字号</label>
        <input type="number" id="fontSize" value="28" min="12" max="96">
        <span id="fontSizeVal" style="color:var(--text-dim);font-size:12px;">28</span>
      </div>
    </div>
    <div class="row2">
      <div>
        <label>画布宽</label>
        <input type="number" id="canvasW" value="920" min="320" step="10">
      </div>
      <div>
        <label>画布高</label>
        <input type="number" id="canvasH" value="520" min="200" step="10">
      </div>
    </div>
    <div class="row">
      <button type="button" class="btn-ghost" id="applyCanvasBtn">应用画布尺寸</button>
      <button type="button" class="btn-primary" id="exportBtn">导出 PNG</button>
    </div>
    <p class="hint">预览区中拖动<strong>蓝色框</strong>内：左侧为图标（原尺寸），右侧为装备名。导出为当前画布整图。</p>
  </div>
  <div class="preview-wrap">
    <canvas id="preview" width="920" height="520"></canvas>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
